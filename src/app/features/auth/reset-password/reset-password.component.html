<div class="app-auth-page">
  <div class="app-auth-card-wrap">
    <div class="app-auth-card">
      <div class="mb-8 text-center">
        <div class="mb-5 flex justify-center">
          <app-logo size="lg" />
        </div>
        <h1 class="font-sans text-2xl font-bold tracking-tight text-foreground">
          Reset password
        </h1>
        <p class="mt-1.5 text-sm text-ice">Choose a strong new password for your account</p>
      </div>

      @if (done()) {
        <div
          role="status"
          class="rounded-lg border border-primary/20 bg-primary/10 px-5 py-4 text-sm text-foreground"
        >
          Password saved. Redirecting to sign in…
        </div>
      } @else {
        <form (ngSubmit)="onSubmit()" class="space-y-6">
          @if (error(); as errMsg) {
            <div class="alert-error px-5 py-4" role="alert">
              {{ errMsg }}
            </div>
          }

          <div>
            <label for="rp-new" class="mb-1.5 block text-sm font-medium text-muted-foreground">New password</label>
            <input
              id="rp-new"
              type="password"
              name="newPassword"
              uiInput
              [(ngModel)]="newPassword"
              placeholder="Enter new password"
              autocomplete="new-password"
              [disabled]="loading() || !token"
              [className]="'w-full px-4 py-3'"
            />
          </div>

          <div>
            <label for="rp-confirm" class="mb-1.5 block text-sm font-medium text-muted-foreground"
              >Confirm new password</label
            >
            <input
              id="rp-confirm"
              type="password"
              name="confirmPassword"
              uiInput
              [(ngModel)]="confirmPassword"
              placeholder="Confirm new password"
              autocomplete="new-password"
              [disabled]="loading() || !token"
              [className]="'w-full px-4 py-3'"
            />
          </div>

          <ui-button
            type="submit"
            variant="default"
            [disabled]="loading() || !token"
            [className]="'w-full justify-center py-3 rounded-lg'"
          >
            {{ loading() ? 'Updating…' : 'Update password' }}
          </ui-button>
        </form>

        <p class="mt-6 text-center text-sm">
          <a
            routerLink="/login"
            class="font-medium text-primary transition-colors hover:text-primary/90 hover:underline"
          >
            Back to login
          </a>
        </p>
      }
    </div>
  </div>
</div>
