<div class="app-auth-page">
  <div class="app-auth-card-wrap">
    <div class="app-auth-card">
      <div class="mb-8 text-center">
        <div class="mb-5 flex justify-center">
          <app-logo size="lg" />
        </div>
        <h1 class="font-sans text-2xl font-bold tracking-tight text-foreground">Welcome Back</h1>
        <p class="mt-1.5 text-sm text-ice">
          Sign in to continue
        </p>
      </div>

      <form (ngSubmit)="onSubmit()" class="space-y-6">
        @if (error(); as errMsg) {
          <div
            class="alert-error px-5 py-4"
            role="alert"
          >
            {{ errMsg }}
          </div>
        }

        <div>
          <label
            for="emailOrPhone"
            class="mb-1.5 block text-sm font-medium text-ice"
          >
            Email or phone
          </label>
          <input
            id="emailOrPhone"
            type="text"
            uiInput
            [(ngModel)]="emailOrPhone"
            name="emailOrPhone"
            placeholder="e.g. you@example.com or +357 99 123456"
            [className]="'w-full px-4 py-3'"
            autocomplete="username"
          />
        </div>

        <div>
          <div class="mb-2 flex items-baseline justify-between gap-4">
            <label for="password" class="text-sm font-medium text-ice">
              Password
            </label>
            <a
              routerLink="/forgot-password"
              class="shrink-0 text-sm font-medium text-primary transition-colors duration-300 ease-in-out hover:text-accent"
            >
              Forgot password?
            </a>
          </div>
          <input
            id="password"
            type="password"
            uiInput
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            [className]="'w-full px-4 py-3'"
            autocomplete="current-password"
          />
        </div>

        <ui-button
          type="submit"
          variant="default"
          [disabled]="loading()"
          [className]="'w-full justify-center py-3 rounded-lg'"
        >
          {{ loading() ? 'Signing in…' : 'Sign in' }}
        </ui-button>
      </form>

      <p class="mt-6 text-center text-sm text-ice">
        Don't have an account?
        <a
          routerLink="/register"
          class="font-medium text-primary transition-colors duration-300 ease-in-out hover:text-primary/90 hover:underline"
        >
          Register
        </a>
      </p>
    </div>
  </div>
</div>
