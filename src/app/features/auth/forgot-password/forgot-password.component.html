<div class="app-auth-page">
  <div class="app-auth-card-wrap">
    <div class="app-auth-card">
      <div class="mb-8 text-center">
        <div class="mb-5 flex justify-center">
          <app-logo size="lg" />
        </div>
        <h1 class="font-sans text-2xl font-bold tracking-tight text-foreground">
          Forgot password
        </h1>
        <p class="mt-1.5 text-sm text-ice">
          We'll email you a link to reset your password
        </p>
      </div>

      @if (submitted()) {
        <div
          role="status"
          class="rounded-lg border border-primary/20 bg-primary/10 px-5 py-4 text-sm text-foreground"
        >
          {{ genericSuccessMessage }}
        </div>
        <div class="mt-6 flex flex-col gap-3 sm:flex-row sm:justify-center">
          <a
            routerLink="/login"
            class="inline-flex justify-center rounded-lg bg-primary px-5 py-2.5 text-center text-sm font-medium text-primary-foreground transition hover:bg-[#16A34A]"
          >
            Back to login
          </a>
        </div>
      } @else {
        <form (ngSubmit)="onSubmit()" class="space-y-6">
          @if (error(); as errMsg) {
            <div class="alert-error px-5 py-4" role="alert">
              {{ errMsg }}
            </div>
          }

          <div>
            <label for="fp-email" class="mb-1.5 block text-sm font-medium text-muted-foreground">Email</label>
            <input
              id="fp-email"
              type="email"
              name="email"
              uiInput
              [(ngModel)]="email"
              placeholder="you@example.com"
              autocomplete="email"
              [disabled]="loading()"
              [className]="'w-full px-4 py-3'"
            />
          </div>

          <ui-button
            type="submit"
            variant="default"
            [disabled]="loading()"
            [className]="'w-full justify-center py-3 rounded-lg'"
          >
            {{ loading() ? 'Sending…' : 'Send reset link' }}
          </ui-button>
        </form>

        <p class="mt-6 text-center text-sm">
          <a
            routerLink="/login"
            class="font-medium text-primary transition-colors hover:text-primary/90 hover:underline"
          >
            Back to login
          </a>
        </p>
      }
    </div>
  </div>
</div>
