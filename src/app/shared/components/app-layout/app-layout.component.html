>

  <div
    class="app-shell-sidebar-offset flex min-h-0 min-w-0 flex-1 flex-col overflow-x-hidden pb-12 md:min-h-0 md:overflow-hidden"

        <h1 class="app-shell-header-title">{{ title }}</h1>
